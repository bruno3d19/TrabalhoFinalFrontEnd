<main class="forgot-password">
  <a class="back" routerLink="/login" aria-label="Voltar para login">
    <span class="back__icon" aria-hidden="true">←</span>
    <span>Voltar para login</span>
  </a>

  <section class="card" aria-label="Recuperar senha">
    <header>
      <h1>Recuperar senha</h1>
      <p>Informe seu email para receber um link de recuperacao</p>
    </header>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <label class="field" for="email">
        <span>Email</span>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="seu@email.com"
          autocomplete="email"
        />
      </label>

      <p class="feedback feedback--error" *ngIf="form.controls.email.invalid && form.controls.email.touched">
        Informe um email valido.
      </p>

      <p class="feedback feedback--success" *ngIf="successMessage()">{{ successMessage() }}</p>
      <p class="feedback feedback--error" *ngIf="errorMessage()">{{ errorMessage() }}</p>

      <button type="submit" class="submit" [disabled]="isLoading()">
        <span class="spinner" *ngIf="isLoading()" aria-hidden="true"></span>
        <span>{{ isLoading() ? 'Enviando...' : 'Enviar link de recuperacao' }}</span>
      </button>
    </form>
  </section>
</main>
